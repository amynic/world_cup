<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ World Cup Trivia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- START SCREEN -->
        <div id="start-screen" class="screen">
            <h1>⚽ World Cup Trivia</h1>
            <p class="subtitle">Test your FIFA World Cup knowledge (1930–2022)</p>
            <div class="difficulty-select">
                <h3>Choose Difficulty</h3>
                <button class="btn btn-easy" id="btn-easy">Easy</button>
                <button class="btn btn-medium" id="btn-medium">Medium</button>
                <button class="btn btn-hard" id="btn-hard">Hard</button>
                <button class="btn btn-all" id="btn-all">Mix It Up!</button>
            </div>
            <p class="question-count" id="question-count"></p>
            <button class="btn btn-data" id="btn-data-start">📊 Explore the Data</button>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen hidden">
            <div class="game-header">
                <button class="btn-home" id="btn-home" title="Back to Home">🏠</button>
                <div class="progress">
                    <span id="question-number">1</span> / <span id="total-questions">10</span>
                </div>
                <div class="score">Score: <span id="score">0</span></div>
                <div class="difficulty-badge" id="difficulty-badge"></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="category-tag" id="category-tag"></div>
            <h2 class="question-text" id="question-text"></h2>
            <div class="options" id="options"></div>
            <div class="fact-box hidden" id="fact-box">
                <div class="fact-icon">💡</div>
                <p id="fact-text"></p>
            </div>
            <button class="btn btn-next hidden" id="next-btn">Next Question →</button>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="screen hidden">
            <h1 id="results-emoji">🏆</h1>
            <h2 id="results-title"></h2>
            <div class="score-circle">
                <span id="final-score">0</span>
                <span class="score-label">/ <span id="final-total">10</span></span>
            </div>
            <p id="results-message"></p>
            <div class="results-stats" id="results-stats"></div>
            <div class="insight-card hidden" id="insight-card">
                <h3 id="insight-title"></h3>
                <img id="insight-image" alt="Analysis chart" />
                <p id="insight-text"></p>
            </div>
            <div class="results-actions">
                <button class="btn btn-all" id="btn-play-again">Play Again</button>
                <button class="btn btn-data" id="btn-data-results">📊 Explore the Data</button>
            </div>
        </div>

        <!-- DATA ANALYSIS SCREEN -->
        <div id="data-screen" class="screen hidden">
            <div class="data-header">
                <button class="btn-home" id="btn-data-home" title="Back to Home">🏠</button>
                <h2>📊 World Cup Data Analysis</h2>
            </div>
            <p class="data-subtitle">Dive into the numbers behind 92 years of World Cup history</p>
            <div id="data-charts"></div>
            <button class="btn btn-all" id="btn-data-back">⚽ Back to Trivia</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="insights.js"></script>
    <script src="game.js"></script>
</body>
</html>
